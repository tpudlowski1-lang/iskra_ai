services:
  - type: web
    name: iskra-ai
    runtime: python

    buildCommand: |
      pip install -r requirements.txt

    startCommand: |
      gunicorn app:app --workers 2 --threads 4 --timeout 120

    envVars:

      - key: PYTHON_VERSION
        value: 3.11.9

      # =========================
      # ROUTER
      # =========================

      - key: LLM_PROVIDER
        value: openai

      - key: LLM_FALLBACK_PROVIDERS
        value: gemini

      # =========================
      # OPENAI
      # =========================

      - key: OPENAI_MODEL
        value: gpt-4o-mini

      # API KEY ustaw ręcznie w panelu Render

      # =========================
      # GEMINI
      # =========================

      # API KEY ustaw ręcznie w panelu Render

    healthCheckPath: /health

    autoDeploy: true
